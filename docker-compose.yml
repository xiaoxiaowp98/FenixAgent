# 开发环境 — 只启动周围基础设施，本地用 bun run dev 跑 RCS
# Usage: docker compose up -d

services:
    # RagFlow 知识库引擎 — 与 RCS 同机部署
    # 依赖 MySQL + Redis，使用内置 Infinity 向量存储（无需 Elasticsearch）
    ragflow:
        image: infiniflow/ragflow:${RAGFLOW_VERSION:-v0.26.0}
        ports:
            - "127.0.0.1:9380:9380"
        environment:
            TZ: "${TZ:-Asia/Shanghai}"
            # MySQL 连接（RagFlow 元数据存储）
            MYSQL_HOST: ragflow-mysql
            MYSQL_PORT: 3306
            MYSQL_USER: root
            MYSQL_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-ragflow_root_2026}
            # Redis 连接（RagFlow 缓存/任务队列）
            REDIS_HOST: ragflow-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${RAGFLOW_REDIS_PASSWORD:-ragflow_redis_2026}
            # 使用内置 Infinity 向量数据库（无需 Elasticsearch）
            DOC_ENGINE: infinity
        volumes:
            - ragflow_data:/ragflow/data
            - ragflow_logs:/ragflow/logs
        depends_on:
            ragflow-mysql:
                condition: service_healthy
            ragflow-redis:
                condition: service_healthy
            infinity:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O- http://localhost:9380/api/v1/version || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 60s

    # RagFlow 依赖：MySQL 8.0（元数据存储）
    ragflow-mysql:
        image: mysql:8.0
        container_name: fenix-ragflow-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-ragflow_root_2026}
            MYSQL_DATABASE: rag_flow
        ports:
            - "127.0.0.1:13306:3306"
        volumes:
            - ragflow_mysql_data:/var/lib/mysql
        command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${RAGFLOW_MYSQL_PASSWORD:-ragflow_root_2026}"]
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 20s

    # RagFlow 依赖：Infinity 向量数据库
    infinity:
        image: infiniflow/infinity:v0.7.0
        container_name: fenix-ragflow-infinity
        restart: unless-stopped
        ports:
            - "127.0.0.1:23817:23817"
            - "127.0.0.1:23820:23820"
        volumes:
            - ragflow_infinity_data:/var/infinity
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O- http://localhost:23820/admin/node/current || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    # RagFlow 依赖：Redis 7（缓存与任务队列）
    ragflow-redis:
        image: redis:7-alpine
        container_name: fenix-ragflow-redis
        restart: unless-stopped
        command: redis-server --requirepass ${RAGFLOW_REDIS_PASSWORD:-ragflow_redis_2026} --appendonly yes
        ports:
            - "127.0.0.1:16379:6379"
        volumes:
            - ragflow_redis_data:/data
        healthcheck:
            test: ["CMD-SHELL", "redis-cli -a ${RAGFLOW_REDIS_PASSWORD:-ragflow_redis_2026} ping | grep PONG"]
            interval: 5s
            timeout: 5s
            retries: 6
            start_period: 10s

    postgres:
        image: postgres:16-alpine
        container_name: fenix-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: rcs
            POSTGRES_PASSWORD: rcs
            POSTGRES_DB: rcs
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rcs"]
            interval: 5s
            timeout: 5s
            retries: 5

    rustfs:
        image: rustfs/rustfs:latest
        container_name: fenix-rustfs
        restart: unless-stopped
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            RUSTFS_VOLUMES: /data/rustfs{0..1}
            RUSTFS_ADDRESS: 0.0.0.0:9000
            RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
            RUSTFS_CONSOLE_ENABLE: "true"
            RUSTFS_ACCESS_KEY: rustfsadmin
            RUSTFS_SECRET_KEY: rustfsadmin@123
            RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
        volumes:
            - rustfs-data:/data
        depends_on:
            rustfs-setup:
                condition: service_completed_successfully
        healthcheck:
            test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s

    rustfs-setup:
        image: alpine:latest
        container_name: fenix-rustfs-setup
        user: root
        volumes:
            - rustfs-data:/data
        command: chown -R 10001:10001 /data

    rustfs-init:
        image: minio/mc:latest
        container_name: fenix-rustfs-init
        depends_on:
            rustfs:
                condition: service_healthy
        entrypoint: >
          /bin/sh -c "
            mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin@123 &&
            mc mb --ignore-existing rustfs/rcs-sessions &&
            mc mb --ignore-existing rustfs/rcs-assets &&
            mc admin config set rustfs api cors_allow_origin='*' &&
              echo 'Buckets created, CORS configured.'
          "

volumes:
    ragflow_data:
    ragflow_logs:
    ragflow_mysql_data:
    ragflow_redis_data:
    ragflow_infinity_data:
    postgres-data:
    rustfs-data:
