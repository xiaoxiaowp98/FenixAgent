# 开发环境 — 只启动周围基础设施，本地用 bun run dev 跑 RCS
# Usage: docker compose up -d

services:
    # RagFlow 知识库引擎 — 与 RCS 同机部署
    ragflow:
        image: infiniflow/ragflow:${RAGFLOW_VERSION:-v0.15.0}
        ports:
            - "127.0.0.1:9380:9380"
        environment:
            TZ: "${TZ:-Asia/Shanghai}"
        volumes:
            - ragflow_data:/ragflow/data
            - ragflow_logs:/ragflow/logs
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -q -O- http://localhost:9380/api/v1/version || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 30s

    postgres:
        image: postgres:16-alpine
        container_name: fenix-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: rcs
            POSTGRES_PASSWORD: rcs
            POSTGRES_DB: rcs
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U rcs"]
            interval: 5s
            timeout: 5s
            retries: 5

    rustfs:
        image: rustfs/rustfs:latest
        container_name: fenix-rustfs
        restart: unless-stopped
        ports:
            - "9000:9000"
            - "9001:9001"
        environment:
            RUSTFS_VOLUMES: /data/rustfs{0..1}
            RUSTFS_ADDRESS: 0.0.0.0:9000
            RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
            RUSTFS_CONSOLE_ENABLE: "true"
            RUSTFS_ACCESS_KEY: rustfsadmin
            RUSTFS_SECRET_KEY: rustfsadmin@123
            RUSTFS_UNSAFE_BYPASS_DISK_CHECK: "true"
        volumes:
            - rustfs-data:/data
        depends_on:
            rustfs-setup:
                condition: service_completed_successfully
        healthcheck:
            test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s

    rustfs-setup:
        image: alpine:latest
        container_name: fenix-rustfs-setup
        user: root
        volumes:
            - rustfs-data:/data
        command: chown -R 10001:10001 /data

    rustfs-init:
        image: minio/mc:latest
        container_name: fenix-rustfs-init
        depends_on:
            rustfs:
                condition: service_healthy
        entrypoint: >
          /bin/sh -c "
            mc alias set rustfs http://rustfs:9000 rustfsadmin rustfsadmin@123 &&
            mc mb --ignore-existing rustfs/rcs-sessions &&
            mc mb --ignore-existing rustfs/rcs-assets &&
            mc admin config set rustfs api cors_allow_origin='*' &&
              echo 'Buckets created, CORS configured.'
          "

volumes:
    ragflow_data:
    ragflow_logs:
    postgres-data:
    rustfs-data:
